services:
  web:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      WATCHPACK_POLLING: "true"
    command: npm run dev

  build:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run build
    profiles:
      - build

  preview:
    build: .
    ports:
      - "4173:4173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run preview -- --port 4173
    profiles:
      - preview
